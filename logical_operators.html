<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phép toán Tập hợp và Logic trong Xử lý Ảnh</title>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #0f172a; color: #f8fafc; }
        .glass-panel { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 1rem; }
        .gradient-text { background: linear-gradient(to right, #38bdf8, #818cf8, #c084fc); -webkit-background-clip: text; color: transparent; }
        
        .math-expr { font-family: 'Courier New', Courier, monospace; color: #a7f3d0; background: rgba(0,0,0,0.3); padding: 0.1rem 0.4rem; border-radius: 0.25rem; font-weight: bold; }
        .math-block { display: block; font-family: 'Courier New', Courier, monospace; color: #a7f3d0; background: rgba(0,0,0,0.4); padding: 1rem; border-radius: 0.5rem; text-align: center; margin: 1rem 0; font-size: 1.1rem; }
        
        table.math-table { width: 100%; border-collapse: collapse; margin: 1rem 0; background: rgba(15, 23, 42, 0.6); }
        table.math-table th, table.math-table td { border: 1px solid #475569; padding: 0.75rem; text-align: left; }
        table.math-table th { background: #1e293b; color: #94a3b8; font-weight: bold; text-align: center; }
        table.math-table td { font-family: 'Courier New', Courier, monospace; font-size: 0.95rem; }
        
        /* Range slider */
        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 18px; width: 18px; border-radius: 50%; background: #38bdf8; cursor: pointer; margin-top: -6px; box-shadow: 0 0 5px rgba(0,0,0,0.5); }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 6px; cursor: pointer; background: #475569; border-radius: 3px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // ==============================================================================
        // PHẦN 1: TẬP HỢP VÀ BIỂU ĐỒ VENN (Hình 2.35 & Bảng 2.1)
        // ==============================================================================
        const BasicSetOperations = () => {
            const [activeVenn, setActiveVenn] = useState('a_union_b');

            const renderVennDiagram = () => {
                const cxA = 120, cyA = 100, rA = 60;
                const cxB = 180, cyB = 100, rB = 60;
                const cxC = 150, cyC = 140, rC = 55; // For 3-set diagram

                const is3Set = activeVenn === 'a_int_b_union_c';
                const viewBox = is3Set ? "0 0 300 230" : "0 0 300 200";

                return (
                    <svg viewBox={viewBox} className="w-full h-full bg-white rounded-lg">
                        <defs>
                            <clipPath id="clipA"><circle cx={cxA} cy={cyA} r={rA} /></clipPath>
                            <clipPath id="clipB"><circle cx={cxB} cy={cyB} r={rB} /></clipPath>
                            <clipPath id="clipC"><circle cx={cxC} cy={cyC} r={rC} /></clipPath>
                            <mask id="maskB_union_C">
                                <rect width="100%" height="100%" fill="black" />
                                <circle cx={cxB} cy={cyB} r={rB} fill="white" />
                                <circle cx={cxC} cy={cyC} r={rC} fill="white" />
                            </mask>
                            <mask id="maskA_int_B_union_C">
                                <rect width="100%" height="100%" fill="black" />
                                <circle cx={cxA} cy={cyA} r={rA} fill="white" mask="url(#maskB_union_C)" />
                            </mask>
                        </defs>

                        {/* Không gian mẫu Ω (Shaded if it's the Universe) */}
                        {activeVenn === 'omega' && <rect width="100%" height="100%" fill="#bfdbfe" />}
                        {activeVenn === 'comp_a' && <rect width="100%" height="100%" fill="#bfdbfe" />}
                        {activeVenn === 'comp_b' && <rect width="100%" height="100%" fill="#bfdbfe" />}

                        {/* Phép toán */}
                        {activeVenn === 'comp_a' && <circle cx={cxA} cy={cyA} r={rA} fill="#ffffff" />}
                        {activeVenn === 'comp_b' && <circle cx={cxB} cy={cyB} r={rB} fill="#ffffff" />}
                        
                        {activeVenn === 'a_union_b' && (
                            <g><circle cx={cxA} cy={cyA} r={rA} fill="#bfdbfe" /><circle cx={cxB} cy={cyB} r={rB} fill="#bfdbfe" /></g>
                        )}
                        {activeVenn === 'a_int_b' && (
                            <circle cx={cxA} cy={cyA} r={rA} fill="#bfdbfe" clipPath="url(#clipB)" />
                        )}
                        {activeVenn === 'a_diff_b' && (
                            <g><circle cx={cxA} cy={cyA} r={rA} fill="#bfdbfe" /><circle cx={cxB} cy={cyB} r={rB} fill="#ffffff" /></g>
                        )}
                        {activeVenn === 'a_int_b_union_c' && (
                            <rect width="100%" height="100%" fill="#bfdbfe" mask="url(#maskA_int_B_union_C)" />
                        )}

                        {/* Viền ngoài */}
                        <circle cx={cxA} cy={cyA} r={rA} fill="none" stroke="#1e3a8a" strokeWidth="1.5" />
                        <circle cx={cxB} cy={cyB} r={rB} fill="none" stroke="#1e3a8a" strokeWidth="1.5" />
                        {is3Set && <circle cx={cxC} cy={cyC} r={rC} fill="none" stroke="#1e3a8a" strokeWidth="1.5" />}
                        
                        {/* Nhãn */}
                        <text x={cxA - 25} y={cyA - 10} fill="#1e3a8a" fontSize="16" fontFamily="serif" fontStyle="italic">A</text>
                        <text x={cxB + 15} y={cyB - 10} fill="#1e3a8a" fontSize="16" fontFamily="serif" fontStyle="italic">B</text>
                        {is3Set && <text x={cxC - 5} y={cyC + 35} fill="#1e3a8a" fontSize="16" fontFamily="serif" fontStyle="italic">C</text>}
                        
                        <text x={10} y={20} fill="#1e3a8a" fontSize="16" fontFamily="serif">Ω</text>
                    </svg>
                );
            };

            return (
                <div className="glass-panel p-6 mt-6 border border-blue-500/30">
                    <h3 className="text-2xl font-bold mb-4 text-blue-400">1. Phép toán Tập hợp Cơ bản (Basic Set Operations)</h3>
                    
                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8">
                        <div className="space-y-4 text-slate-300 text-sm">
                            <p>Tập hợp (Set) là một nhóm các đối tượng khác biệt. Nếu <span className="math-expr">a</span> là một phần tử của tập <span className="math-expr">A</span>, ta viết: <span className="math-expr">a ∈ A</span>.</p>
                            <p>Không gian mẫu <span className="math-expr">Ω</span> (Sample space / Set universe) chứa tất cả phần tử có thể có. Trong xử lý ảnh, <span className="math-expr">Ω</span> chính là hình chữ nhật chứa toàn bộ các điểm ảnh.</p>
                            
                            <h4 className="font-bold text-white text-base mt-6 border-b border-slate-700 pb-2">Các định nghĩa quan trọng:</h4>
                            <ul className="space-y-3">
                                <li><span className="text-blue-300 font-bold">Hợp (Union):</span> <span className="math-expr">C = A ∪ B</span> là tập chứa các phần tử thuộc A, B, hoặc cả hai.</li>
                                <li><span className="text-emerald-300 font-bold">Giao (Intersection):</span> <span className="math-expr">D = A ∩ B</span> là tập chỉ chứa các phần tử thuộc <b>cả</b> A và B. Nếu <span className="math-expr">A ∩ B = ∅</span>, hai tập gọi là rời rạc (disjoint).</li>
                                <li><span className="text-purple-300 font-bold">Phần bù (Complement):</span> <span className="math-expr">Aᶜ = &#123;w | w ∉ A&#125;</span> là tập các phần tử thuộc Ω nhưng không thuộc A.</li>
                                <li><span className="text-amber-300 font-bold">Hiệu (Difference):</span> <span className="math-expr">A - B = &#123;w | w ∈ A, w ∉ B&#125; = A ∩ Bᶜ</span></li>
                            </ul>
                        </div>

                        <div className="bg-slate-900 p-6 rounded-xl border border-slate-700 flex flex-col items-center shadow-xl">
                            <h4 className="text-white font-bold mb-4">Biểu đồ Venn (Hình 2.35)</h4>
                            <div className="w-full max-w-[300px] border-4 border-slate-500 rounded-xl overflow-hidden shadow-inner mb-4">
                                {renderVennDiagram()}
                            </div>
                            
                            <div className="grid grid-cols-2 sm:grid-cols-3 gap-2 w-full">
                                <button onClick={()=>setActiveVenn('omega')} className={`p-2 text-xs font-mono border rounded ${activeVenn==='omega'?'bg-blue-600 text-white border-blue-400':'bg-slate-800 text-slate-400 border-slate-600 hover:bg-slate-700'}`}>Ω (Universe)</button>
                                <button onClick={()=>setActiveVenn('comp_a')} className={`p-2 text-xs font-mono border rounded ${activeVenn==='comp_a'?'bg-blue-600 text-white border-blue-400':'bg-slate-800 text-slate-400 border-slate-600 hover:bg-slate-700'}`}>Aᶜ</button>
                                <button onClick={()=>setActiveVenn('comp_b')} className={`p-2 text-xs font-mono border rounded ${activeVenn==='comp_b'?'bg-blue-600 text-white border-blue-400':'bg-slate-800 text-slate-400 border-slate-600 hover:bg-slate-700'}`}>Bᶜ</button>
                                <button onClick={()=>setActiveVenn('a_int_b')} className={`p-2 text-xs font-mono border rounded ${activeVenn==='a_int_b'?'bg-blue-600 text-white border-blue-400':'bg-slate-800 text-slate-400 border-slate-600 hover:bg-slate-700'}`}>A ∩ B</button>
                                <button onClick={()=>setActiveVenn('a_union_b')} className={`p-2 text-xs font-mono border rounded ${activeVenn==='a_union_b'?'bg-blue-600 text-white border-blue-400':'bg-slate-800 text-slate-400 border-slate-600 hover:bg-slate-700'}`}>A ∪ B</button>
                                <button onClick={()=>setActiveVenn('a_diff_b')} className={`p-2 text-xs font-mono border rounded ${activeVenn==='a_diff_b'?'bg-blue-600 text-white border-blue-400':'bg-slate-800 text-slate-400 border-slate-600 hover:bg-slate-700'}`}>A - B</button>
                                <button onClick={()=>setActiveVenn('a_int_b_union_c')} className={`p-2 text-xs font-mono border rounded col-span-2 sm:col-span-3 ${activeVenn==='a_int_b_union_c'?'bg-blue-600 text-white border-blue-400':'bg-slate-800 text-slate-400 border-slate-600 hover:bg-slate-700'}`}>A ∩ (B ∪ C)</button>
                            </div>
                        </div>
                    </div>

                    <h4 className="font-bold text-white text-base mt-6 mb-2">Bảng 2.1: Các định luật Tập hợp quan trọng</h4>
                    <div className="overflow-x-auto">
                        <table className="math-table">
                            <thead>
                                <tr>
                                    <th>Description (Mô tả)</th>
                                    <th>Expressions (Biểu thức)</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td className="text-slate-300 font-sans">Operations between sample space and null sets</td>
                                    <td>Ωᶜ = ∅; ∅ᶜ = Ω; Ω ∪ ∅ = Ω; Ω ∩ ∅ = ∅</td>
                                </tr>
                                <tr>
                                    <td className="text-slate-300 font-sans">Union and intersection with null and sample space sets</td>
                                    <td>A ∪ ∅ = A; A ∩ ∅ = ∅; A ∪ Ω = Ω; A ∩ Ω = A</td>
                                </tr>
                                <tr>
                                    <td className="text-slate-300 font-sans">Commutative laws (Tính giao hoán)</td>
                                    <td>A ∪ B = B ∪ A<br/>A ∩ B = B ∩ A</td>
                                </tr>
                                <tr>
                                    <td className="text-slate-300 font-sans">Associative laws (Tính kết hợp)</td>
                                    <td>(A ∪ B) ∪ C = A ∪ (B ∪ C)<br/>(A ∩ B) ∩ C = A ∩ (B ∩ C)</td>
                                </tr>
                                <tr>
                                    <td className="text-slate-300 font-sans">Distributive laws (Tính phân phối)</td>
                                    <td>(A ∪ B) ∩ C = (A ∩ C) ∪ (B ∩ C)<br/>(A ∩ B) ∪ C = (A ∪ C) ∩ (B ∪ C)</td>
                                </tr>
                                <tr>
                                    <td className="text-slate-300 font-sans">DeMorgan's laws (Định luật DeMorgan)</td>
                                    <td className="text-amber-300 font-bold">(A ∪ B)ᶜ = Aᶜ ∩ Bᶜ<br/>(A ∩ B)ᶜ = Aᶜ ∪ Bᶜ</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        };

        // ==============================================================================
        // PHẦN 2: GRAYSCALE SET OPERATIONS (Ví dụ 2.8 & Hình 2.36)
        // ==============================================================================
        const GrayscaleSetSim = () => {
            const [constK, setConstK] = useState(255);
            const [constB, setConstB] = useState(128);
            
            const canvasOrigRef = useRef(null);
            const canvasCompRef = useRef(null);
            const canvasMaxRef = useRef(null);

            useEffect(() => {
                // Tạo ảnh gốc (A): Giả lập hình dạng X-quang/cơ thể mờ (Hình 2.36a)
                const canvas = canvasOrigRef.current;
                const ctx = canvas.getContext('2d');
                ctx.fillStyle = '#000000';
                ctx.fillRect(0, 0, 150, 150);

                // Đầu
                const head = ctx.createRadialGradient(75, 40, 5, 75, 40, 25);
                head.addColorStop(0, '#ffffff'); head.addColorStop(1, '#000000');
                ctx.fillStyle = head; ctx.beginPath(); ctx.arc(75, 40, 25, 0, Math.PI*2); ctx.fill();

                // Xương sườn / thân
                const body = ctx.createRadialGradient(75, 110, 10, 75, 110, 50);
                body.addColorStop(0, '#dddddd'); body.addColorStop(1, '#000000');
                ctx.fillStyle = body; ctx.beginPath(); ctx.arc(75, 110, 50, 0, Math.PI*2); ctx.fill();

                // Vai
                const shoulder = ctx.createRadialGradient(75, 90, 10, 75, 90, 60);
                shoulder.addColorStop(0.3, 'rgba(200,200,200,0.8)'); shoulder.addColorStop(1, '#000000');
                ctx.fillStyle = shoulder; ctx.beginPath(); ctx.ellipse(75, 90, 60, 15, 0, 0, Math.PI*2); ctx.fill();

                const dataA = ctx.getImageData(0, 0, 150, 150);

                // Tạo ảnh Phần bù (A^c)
                const ctxComp = canvasCompRef.current.getContext('2d');
                const dataComp = ctxComp.createImageData(150, 150);
                for (let i = 0; i < dataA.data.length; i += 4) {
                    const z = dataA.data[i];
                    // A^c = K - z (K is usually 255 for 8-bit image)
                    const val = Math.max(0, Math.min(255, constK - z));
                    dataComp.data[i] = val;
                    dataComp.data[i+1] = val;
                    dataComp.data[i+2] = val;
                    dataComp.data[i+3] = 255;
                }
                ctxComp.putImageData(dataComp, 0, 0);

                // Tạo ảnh Hợp (A U B) = Max(A, B)
                const ctxMax = canvasMaxRef.current.getContext('2d');
                const dataMax = ctxMax.createImageData(150, 150);
                for (let i = 0; i < dataA.data.length; i += 4) {
                    // A U B on grayscale is max(a, b)
                    const maxVal = Math.max(dataA.data[i], constB);
                    dataMax.data[i] = maxVal;
                    dataMax.data[i+1] = maxVal;
                    dataMax.data[i+2] = maxVal;
                    dataMax.data[i+3] = 255;
                }
                ctxMax.putImageData(dataMax, 0, 0);
            }, [constK, constB]);

            return (
                <div className="glass-panel p-6 mt-6 border border-emerald-500/30">
                    <h3 className="text-xl font-bold mb-4 text-emerald-400">2. Phép toán Tập hợp trên Ảnh Xám (Ví dụ 2.8)</h3>
                    <div className="bg-slate-800/60 p-4 rounded-xl border border-slate-600 mb-6 text-sm text-slate-300">
                        <p>Các khái niệm tập hợp ban đầu chỉ dùng cho ảnh nhị phân. Để áp dụng cho ảnh xám, ta coi phần tử của tập hợp là <span className="math-expr">A = &#123;(x, y, z)&#125;</span> với <span className="math-expr">z</span> là cường độ sáng.</p>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                        {/* Phần bù */}
                        <div className="bg-slate-900 p-5 rounded-xl border border-slate-700 flex flex-col items-center">
                            <h4 className="text-white font-bold mb-3">Phần bù ảnh Xám (Ảnh Âm bản)</h4>
                            <div className="math-block text-[13px] p-2 mb-4 w-full text-amber-300">Aᶜ = &#123;(x, y, K - z) | (x, y, z) ∈ A&#125;</div>
                            
                            <div className="flex items-center gap-4 mb-4 w-full">
                                <span className="text-slate-400 font-mono text-xs whitespace-nowrap">Hằng số K:</span>
                                <input type="range" min="0" max="255" value={constK} onChange={(e)=>setConstK(Number(e.target.value))} className="w-full" />
                                <span className="text-white font-bold w-8 text-right">{constK}</span>
                            </div>

                            <div className="flex justify-center items-center gap-4">
                                <div className="text-center">
                                    <canvas ref={canvasOrigRef} width="130" height="130" className="border border-slate-500 rounded bg-black"></canvas>
                                    <div className="text-xs text-slate-400 mt-2 font-mono">Ảnh A</div>
                                </div>
                                <div className="text-2xl text-slate-500">→</div>
                                <div className="text-center">
                                    <canvas ref={canvasCompRef} width="130" height="130" className="border border-amber-500 rounded shadow-[0_0_15px_rgba(245,158,11,0.3)] bg-black"></canvas>
                                    <div className="text-xs text-amber-400 font-bold mt-2 font-mono">Aᶜ (Âm bản)</div>
                                </div>
                            </div>
                        </div>

                        {/* Hợp */}
                        <div className="bg-slate-900 p-5 rounded-xl border border-slate-700 flex flex-col items-center">
                            <h4 className="text-white font-bold mb-3">Hợp của ảnh Xám (Phép MAX)</h4>
                            <div className="math-block text-[13px] p-2 mb-4 w-full text-emerald-300">A ∪ B = &#123;max(a, b) | a ∈ A, b ∈ B&#125;</div>
                            
                            <div className="flex items-center gap-4 mb-4 w-full">
                                <span className="text-slate-400 font-mono text-xs whitespace-nowrap">Hằng số b:</span>
                                <input type="range" min="0" max="255" value={constB} onChange={(e)=>setConstB(Number(e.target.value))} className="w-full" />
                                <span className="text-white font-bold w-8 text-right">{constB}</span>
                            </div>

                            <div className="flex justify-center items-center gap-4">
                                <div className="text-center">
                                    <div className="w-[130px] h-[130px] border border-slate-500 rounded flex flex-col items-center justify-center font-bold text-sm shadow-inner" style={{ backgroundColor: `rgb(${constB},${constB},${constB})`, color: constB > 128 ? 'black' : 'white' }}>
                                        Ảnh B<br/>(Màu xám {constB})
                                    </div>
                                </div>
                                <div className="text-2xl text-slate-500">→</div>
                                <div className="text-center">
                                    <canvas ref={canvasMaxRef} width="130" height="130" className="border border-emerald-500 rounded shadow-[0_0_15px_rgba(16,185,129,0.3)] bg-black"></canvas>
                                    <div className="text-xs text-emerald-400 font-bold mt-2 font-mono">A ∪ B</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // ==============================================================================
        // PHẦN 3: LOGICAL OPERATIONS (Bảng 2.2 & Hình 2.37)
        // ==============================================================================
        const LogicalOperationsSim = () => {
            const [op, setOp] = useState('AND');
            
            const canvasB1Ref = useRef(null);
            const canvasB2Ref = useRef(null);
            const canvasResRef = useRef(null);
            const w = 200, h = 120;

            useEffect(() => {
                // Tạo B1 (Khung chữ nhật trắng ở giữa)
                const cB1 = document.createElement('canvas'); cB1.width=w; cB1.height=h;
                const ctx1 = cB1.getContext('2d');
                ctx1.fillStyle = '#000000'; ctx1.fillRect(0,0,w,h);
                ctx1.fillStyle = '#ffffff'; ctx1.fillRect(30, 30, 100, 60);
                const dataB1 = ctx1.getImageData(0,0,w,h);
                canvasB1Ref.current.getContext('2d').putImageData(dataB1, 0,0);

                // Tạo B2 (Khung chữ nhật trắng lệch phải)
                const cB2 = document.createElement('canvas'); cB2.width=w; cB2.height=h;
                const ctx2 = cB2.getContext('2d');
                ctx2.fillStyle = '#000000'; ctx2.fillRect(0,0,w,h);
                ctx2.fillStyle = '#ffffff'; ctx2.fillRect(100, 20, 70, 80);
                const dataB2 = ctx2.getImageData(0,0,w,h);
                canvasB2Ref.current.getContext('2d').putImageData(dataB2, 0,0);

                // Tính toán Logic cho Kết quả
                const resData = new ImageData(w, h);
                for (let i = 0; i < dataB1.data.length; i += 4) {
                    const b1 = dataB1.data[i] === 255;
                    const b2 = dataB2.data[i] === 255;
                    let out = false;

                    if (op === 'NOT_B1') out = !b1;
                    if (op === 'AND') out = b1 && b2;
                    if (op === 'OR') out = b1 || b2;
                    if (op === 'AND_NOT') out = b1 && !b2;
                    if (op === 'XOR') out = b1 !== b2;

                    const val = out ? 255 : 0;
                    resData.data[i] = val;
                    resData.data[i+1] = val;
                    resData.data[i+2] = val;
                    resData.data[i+3] = 255;
                }
                
                const ctxRes = canvasResRef.current.getContext('2d');
                ctxRes.putImageData(resData, 0, 0);
                
                // Vẽ nét đứt tham chiếu (giống Hình 2.37)
                ctxRes.strokeStyle = '#38bdf8';
                ctxRes.setLineDash([4, 4]);
                ctxRes.lineWidth = 1.5;
                if (op !== 'NOT_B1') {
                    ctxRes.strokeRect(30, 30, 100, 60); // B1
                    ctxRes.strokeRect(100, 20, 70, 80); // B2
                }

            }, [op]);

            return (
                <div className="glass-panel p-6 mt-6 border border-pink-500/30">
                    <h3 className="text-xl font-bold mb-4 text-pink-400">3. Các Phép Toán Logic trên Ảnh Nhị Phân (Hình 2.37)</h3>
                    <p className="text-sm text-slate-300 mb-4">
                        Phép toán Logic thao tác trên ảnh nhị phân gồm <b>Tiền cảnh (Foreground - Trắng/1/TRUE)</b> và <b>Hậu cảnh (Background - Đen/0/FALSE)</b>. 
                        Các toán tử cơ bản AND, OR, NOT là các toán tử "đầy đủ chức năng" (functionally complete), nghĩa là ta có thể kết hợp chúng để tạo ra mọi toán tử logic khác.
                    </p>

                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-8 items-start">
                        {/* Bảng Chân lý (Table 2.2) */}
                        <div className="lg:col-span-1 bg-slate-900 p-4 rounded-xl border border-slate-700 shadow-xl overflow-x-auto">
                            <h4 className="text-white font-bold text-center mb-2">Bảng 2.2: Bảng Chân lý</h4>
                            <table className="math-table text-center w-full">
                                <thead>
                                    <tr>
                                        <th>a</th>
                                        <th>b</th>
                                        <th className={op === 'AND' ? 'text-pink-400' : ''}>a AND b</th>
                                        <th className={op === 'OR' ? 'text-pink-400' : ''}>a OR b</th>
                                        <th className={op === 'NOT_B1' ? 'text-pink-400' : ''}>NOT(a)</th>
                                    </tr>
                                </thead>
                                <tbody className="text-center text-slate-300">
                                    <tr><td>0</td><td>0</td><td className={op === 'AND' ? 'text-pink-300 bg-pink-900/30 font-bold' : ''}>0</td><td className={op === 'OR' ? 'text-pink-300 bg-pink-900/30 font-bold' : ''}>0</td><td className={op === 'NOT_B1' ? 'text-pink-300 bg-pink-900/30 font-bold' : ''}>1</td></tr>
                                    <tr><td>0</td><td>1</td><td className={op === 'AND' ? 'text-pink-300 bg-pink-900/30 font-bold' : ''}>0</td><td className={op === 'OR' ? 'text-pink-300 bg-pink-900/30 font-bold' : ''}>1</td><td className={op === 'NOT_B1' ? 'text-pink-300 bg-pink-900/30 font-bold' : ''}>1</td></tr>
                                    <tr><td>1</td><td>0</td><td className={op === 'AND' ? 'text-pink-300 bg-pink-900/30 font-bold' : ''}>0</td><td className={op === 'OR' ? 'text-pink-300 bg-pink-900/30 font-bold' : ''}>1</td><td className={op === 'NOT_B1' ? 'text-pink-300 bg-pink-900/30 font-bold' : ''}>0</td></tr>
                                    <tr><td>1</td><td>1</td><td className={op === 'AND' ? 'text-pink-300 bg-pink-900/30 font-bold' : ''}>1</td><td className={op === 'OR' ? 'text-pink-300 bg-pink-900/30 font-bold' : ''}>1</td><td className={op === 'NOT_B1' ? 'text-pink-300 bg-pink-900/30 font-bold' : ''}>0</td></tr>
                                </tbody>
                            </table>
                        </div>

                        {/* Interactive Canvas */}
                        <div className="lg:col-span-2 flex flex-col md:flex-row items-center gap-6 justify-center bg-slate-900 p-6 rounded-xl border border-slate-700 shadow-xl">
                            
                            <div className="flex flex-col gap-4">
                                <div className="text-center">
                                    <div className="text-blue-300 font-bold mb-1 font-mono">Ảnh B₁</div>
                                    <canvas ref={canvasB1Ref} width={w} height={h} className="border-2 border-slate-500 rounded"></canvas>
                                </div>
                                <div className="text-center">
                                    <div className="text-blue-300 font-bold mb-1 font-mono">Ảnh B₂</div>
                                    <canvas ref={canvasB2Ref} width={w} height={h} className="border-2 border-slate-500 rounded"></canvas>
                                </div>
                            </div>

                            <div className="flex flex-col gap-2 w-full max-w-[200px]">
                                <button onClick={() => setOp('NOT_B1')} className={`px-3 py-2 text-sm font-mono font-bold border rounded transition-colors ${op==='NOT_B1'?'bg-pink-600 text-white border-pink-400 shadow-[0_0_10px_rgba(219,39,119,0.5)]':'bg-slate-800 text-pink-400 border-pink-500/50 hover:bg-slate-700'}`}>NOT (B₁)</button>
                                <button onClick={() => setOp('AND')} className={`px-3 py-2 text-sm font-mono font-bold border rounded transition-colors ${op==='AND'?'bg-pink-600 text-white border-pink-400 shadow-[0_0_10px_rgba(219,39,119,0.5)]':'bg-slate-800 text-pink-400 border-pink-500/50 hover:bg-slate-700'}`}>B₁ AND B₂</button>
                                <button onClick={() => setOp('OR')} className={`px-3 py-2 text-sm font-mono font-bold border rounded transition-colors ${op==='OR'?'bg-pink-600 text-white border-pink-400 shadow-[0_0_10px_rgba(219,39,119,0.5)]':'bg-slate-800 text-pink-400 border-pink-500/50 hover:bg-slate-700'}`}>B₁ OR B₂</button>
                                <button onClick={() => setOp('AND_NOT')} className={`px-3 py-2 text-sm font-mono font-bold border rounded transition-colors ${op==='AND_NOT'?'bg-pink-600 text-white border-pink-400 shadow-[0_0_10px_rgba(219,39,119,0.5)]':'bg-slate-800 text-pink-400 border-pink-500/50 hover:bg-slate-700'}`}>B₁ AND [NOT B₂]</button>
                                <button onClick={() => setOp('XOR')} className={`px-3 py-2 text-sm font-mono font-bold border rounded transition-colors ${op==='XOR'?'bg-pink-600 text-white border-pink-400 shadow-[0_0_10px_rgba(219,39,119,0.5)]':'bg-slate-800 text-pink-400 border-pink-500/50 hover:bg-slate-700'}`}>B₁ XOR B₂</button>
                            </div>

                            <div className="text-center">
                                <div className="text-pink-400 font-bold mb-1 font-mono text-lg text-center w-full">Result</div>
                                <canvas ref={canvasResRef} width={w} height={h} className="border-4 border-pink-500 shadow-[0_0_20px_rgba(236,72,153,0.4)] rounded"></canvas>
                                <div className="text-[10px] text-slate-400 mt-2 max-w-[200px] mx-auto">(Nét đứt màu xanh chỉ để tham chiếu đường viền gốc, không thuộc kết quả)</div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // ==============================================================================
        // MAIN APP COMPONENT
        // ==============================================================================
        const App = () => {
            return (
                <div className="min-h-screen p-4 md:p-8 max-w-[1200px] mx-auto space-y-8">
                    <header className="text-center space-y-4 mb-6 border-b border-slate-700 pb-6">
                        <h1 className="text-3xl md:text-5xl font-extrabold tracking-tight">
                            <span className="gradient-text">Toán Học Tập Hợp và Logic</span>
                        </h1>
                        <p className="text-lg text-slate-400 max-w-3xl mx-auto">
                            Công cụ tương tác mô phỏng lý thuyết Tập hợp trên Ảnh Nhị Phân, Ảnh Xám và Toán tử Logic.
                        </p>
                    </header>

                    <BasicSetOperations />
                    <GrayscaleSetSim />
                    <LogicalOperationsSim />

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
