<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Công cụ Toán học Cơ bản trong Xử lý Ảnh (Phần 2.6)</title>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #0f172a; color: #f8fafc; }
        .glass-panel { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 1rem; }
        .gradient-text { background: linear-gradient(to right, #38bdf8, #818cf8, #c084fc); -webkit-background-clip: text; color: transparent; }
        
        .math-expr { font-family: 'Courier New', Courier, monospace; color: #a7f3d0; background: rgba(0,0,0,0.3); padding: 0.1rem 0.4rem; border-radius: 0.25rem; }
        .math-block { display: block; font-family: 'Courier New', Courier, monospace; color: #a7f3d0; background: rgba(0,0,0,0.4); padding: 1rem; border-radius: 0.5rem; text-align: center; margin: 1rem 0; font-size: 1.1rem; }
        
        /* CSS cho ma trận */
        .matrix-bracket {
            position: relative;
            padding: 0 10px;
            display: inline-block;
        }
        .matrix-bracket::before, .matrix-bracket::after {
            content: '';
            position: absolute;
            top: 0; bottom: 0;
            width: 8px;
            border: 2px solid #94a3b8;
        }
        .matrix-bracket::before { left: 0; border-right: none; }
        .matrix-bracket::after { right: 0; border-left: none; }
        
        .matrix-input {
            width: 50px; height: 40px; text-align: center; background: rgba(0,0,0,0.5); 
            border: 1px solid #475569; color: #fff; border-radius: 4px; font-family: monospace; font-size: 16px;
        }
        .matrix-input:focus { outline: none; border-color: #38bdf8; box-shadow: 0 0 5px rgba(56,189,248,0.5); }

        /* Range slider */
        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 18px; width: 18px; border-radius: 50%; background: #38bdf8; cursor: pointer; margin-top: -6px; box-shadow: 0 0 5px rgba(0,0,0,0.5); }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 6px; cursor: pointer; background: #475569; border-radius: 3px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- HÀM TOÁN HỌC MA TRẬN CƠ BẢN ---
        const elementwiseProduct = (A, B) => [
            [A[0][0] * B[0][0], A[0][1] * B[0][1]],
            [A[1][0] * B[1][0], A[1][1] * B[1][1]]
        ];

        const matrixProduct = (A, B) => [
            [A[0][0]*B[0][0] + A[0][1]*B[1][0], A[0][0]*B[0][1] + A[0][1]*B[1][1]],
            [A[1][0]*B[0][0] + A[1][1]*B[1][0], A[1][0]*B[0][1] + A[1][1]*B[1][1]]
        ];

        const matrixAdd = (A, B) => [
            [A[0][0] + B[0][0], A[0][1] + B[0][1]],
            [A[1][0] + B[1][0], A[1][1] + B[1][1]]
        ];

        const matrixScale = (A, scalar) => [
            [A[0][0] * scalar, A[0][1] * scalar],
            [A[1][0] * scalar, A[1][1] * scalar]
        ];

        const getMatrixMax = (A) => Math.max(A[0][0], A[0][1], A[1][0], A[1][1]);
        const getMatrixSum = (A) => A[0][0] + A[0][1] + A[1][0] + A[1][1];

        // Hàm tạo nhiễu Gaussian ngẫu nhiên (Box-Muller transform)
        const gaussianRandom = (mean = 0, stdev = 1) => {
            let u = 1 - Math.random(); 
            let v = Math.random();
            let z = Math.sqrt( -2.0 * Math.log( u ) ) * Math.cos( 2.0 * Math.PI * v );
            return z * stdev + mean;
        };

        // --- COMPONENT HIỂN THỊ MA TRẬN CHỈ ĐỌC ---
        const MatrixDisplay = ({ data, colorClass = "text-white" }) => (
            <div className="matrix-bracket mx-2 align-middle">
                <div className="grid grid-cols-2 gap-2 p-1">
                    <div className={`w-8 text-center font-mono ${colorClass}`}>{data[0][0]}</div>
                    <div className={`w-8 text-center font-mono ${colorClass}`}>{data[0][1]}</div>
                    <div className={`w-8 text-center font-mono ${colorClass}`}>{data[1][0]}</div>
                    <div className={`w-8 text-center font-mono ${colorClass}`}>{data[1][1]}</div>
                </div>
            </div>
        );

        // ==============================================================================
        // PHẦN 1 & 2: TỪ BẢN TRƯỚC
        // ==============================================================================
        const ElementwiseVsMatrix = () => {
            // State ma trận mặc định giống hình trong sách (với số cụ thể)
            const [matA, setMatA] = useState([[1, 2], [3, 4]]);
            const [matB, setMatB] = useState([[5, 6], [7, 8]]);

            const handleInput = (matrix, setMatrix, row, col, val) => {
                const newMat = [...matrix.map(r => [...r])];
                newMat[row][col] = isNaN(parseInt(val)) ? 0 : parseInt(val);
                setMatrix(newMat);
            };

            const MatrixInput = ({ matrix, setMatrix, label }) => (
                <div className="flex flex-col items-center">
                    <div className="text-sm text-slate-400 mb-2 font-bold">{label}</div>
                    <div className="matrix-bracket">
                        <div className="grid grid-cols-2 gap-2 p-1">
                            <input className="matrix-input" value={matrix[0][0]} onChange={e => handleInput(matrix, setMatrix, 0, 0, e.target.value)} />
                            <input className="matrix-input" value={matrix[0][1]} onChange={e => handleInput(matrix, setMatrix, 0, 1, e.target.value)} />
                            <input className="matrix-input" value={matrix[1][0]} onChange={e => handleInput(matrix, setMatrix, 1, 0, e.target.value)} />
                            <input className="matrix-input" value={matrix[1][1]} onChange={e => handleInput(matrix, setMatrix, 1, 1, e.target.value)} />
                        </div>
                    </div>
                </div>
            );

            const resElementwise = elementwiseProduct(matA, matB);
            const resMatrix = matrixProduct(matA, matB);

            return (
                <div className="glass-panel p-6 mt-6 border border-blue-500/30">
                    <h3 className="text-2xl font-bold mb-4 text-blue-400">1. Phép toán Từng phần tử (Elementwise) vs Phép toán Ma trận (Matrix)</h3>
                    
                    <div className="bg-slate-800/60 p-5 rounded-xl border border-slate-600 mb-6 text-slate-300">
                        <ul className="list-disc ml-8 space-y-1 mb-4">
                            <li><span className="text-amber-400 font-bold">Phép toán Từng phần tử (Elementwise):</span> Thực hiện trên từng cặp pixel tương ứng với nhau (tọa độ 1-1). Ký hiệu nhân là <span className="math-expr">⊙</span> (Hadamard product).</li>
                            <li><span className="text-cyan-400 font-bold">Phép toán Ma trận (Matrix):</span> Tuân theo quy tắc đại số tuyến tính nghiêm ngặt (Nhân hàng với cột).</li>
                        </ul>
                        <div className="bg-blue-900/30 p-3 rounded border border-blue-500/50 text-sm">
                            <b className="text-white">Quy tắc của cuốn sách:</b> Trừ khi được chỉ định rõ ràng, mọi phép tính trong sách (cộng, chia, lũy thừa...) đều mặc định là <b>Phép toán Từng phần tử (Elementwise)</b>.
                        </div>
                    </div>

                    <div className="flex flex-col lg:flex-row gap-8 items-center justify-center mb-8">
                        <MatrixInput matrix={matA} setMatrix={setMatA} label="Ma trận A" />
                        <div className="text-2xl font-bold text-slate-500">và</div>
                        <MatrixInput matrix={matB} setMatrix={setMatB} label="Ma trận B" />
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div className="bg-slate-900 p-6 rounded-xl border-t-4 border-amber-500 flex flex-col items-center">
                            <h4 className="text-amber-400 font-bold mb-4">Phép nhân Từng phần tử (A ⊙ B)</h4>
                            <div className="flex items-center gap-2 mb-4">
                                <MatrixDisplay data={matA} /> <span className="font-bold text-amber-500">⊙</span> <MatrixDisplay data={matB} />
                            </div>
                            <div className="text-lg font-bold">=</div>
                            <div className="mt-4"><MatrixDisplay data={resElementwise} colorClass="text-amber-300 font-bold" /></div>
                        </div>

                        <div className="bg-slate-900 p-6 rounded-xl border-t-4 border-cyan-500 flex flex-col items-center">
                            <h4 className="text-cyan-400 font-bold mb-4">Phép nhân Ma trận (A × B)</h4>
                            <div className="flex items-center gap-2 mb-4">
                                <MatrixDisplay data={matA} /> <span className="font-bold text-cyan-500">×</span> <MatrixDisplay data={matB} />
                            </div>
                            <div className="text-lg font-bold">=</div>
                            <div className="mt-4"><MatrixDisplay data={resMatrix} colorClass="text-cyan-300 font-bold" /></div>
                        </div>
                    </div>
                </div>
            );
        };

        const LinearVsNonLinear = () => {
            const [f1, setF1] = useState([[0, 2], [2, 3]]);
            const [f2, setF2] = useState([[6, 5], [4, 7]]);
            const [a, setA] = useState(1);
            const [b, setB] = useState(-1);
            const [operator, setOperator] = useState('max'); 

            const handleMatrixInput = (matrix, setMatrix, row, col, val) => {
                const newMat = [...matrix.map(r => [...r])];
                newMat[row][col] = val === '-' ? '-' : (isNaN(parseInt(val)) ? 0 : parseInt(val));
                setMatrix(newMat);
            };

            const MatrixInputSmall = ({ matrix, setMatrix, label }) => (
                <div className="flex flex-col items-center">
                    <div className="text-xs text-slate-400 mb-1">{label}</div>
                    <div className="matrix-bracket">
                        <div className="grid grid-cols-2 gap-1 p-1">
                            <input className="w-8 h-8 text-center bg-slate-800 border border-slate-600 rounded text-sm text-white" value={matrix[0][0]} onChange={e => handleMatrixInput(matrix, setMatrix, 0, 0, e.target.value)} />
                            <input className="w-8 h-8 text-center bg-slate-800 border border-slate-600 rounded text-sm text-white" value={matrix[0][1]} onChange={e => handleMatrixInput(matrix, setMatrix, 0, 1, e.target.value)} />
                            <input className="w-8 h-8 text-center bg-slate-800 border border-slate-600 rounded text-sm text-white" value={matrix[1][0]} onChange={e => handleMatrixInput(matrix, setMatrix, 1, 0, e.target.value)} />
                            <input className="w-8 h-8 text-center bg-slate-800 border border-slate-600 rounded text-sm text-white" value={matrix[1][1]} onChange={e => handleMatrixInput(matrix, setMatrix, 1, 1, e.target.value)} />
                        </div>
                    </div>
                </div>
            );

            const parseNum = (n) => isNaN(parseInt(n)) ? 0 : parseInt(n);
            const numA = parseNum(a); const numB = parseNum(b);

            const a_f1 = matrixScale(f1, numA); const b_f2 = matrixScale(f2, numB);
            const sum_af1_bf2 = matrixAdd(a_f1, b_f2);
            
            let lhsResult = 0;
            if (operator === 'max') lhsResult = getMatrixMax(sum_af1_bf2);
            if (operator === 'sum') lhsResult = getMatrixSum(sum_af1_bf2);

            let H_f1 = 0; let H_f2 = 0;
            if (operator === 'max') { H_f1 = getMatrixMax(f1); H_f2 = getMatrixMax(f2); }
            if (operator === 'sum') { H_f1 = getMatrixSum(f1); H_f2 = getMatrixSum(f2); }
            
            const a_Hf1 = numA * H_f1; const b_Hf2 = numB * H_f2;
            const rhsResult = a_Hf1 + b_Hf2;

            const isLinear = lhsResult === rhsResult;

            return (
                <div className="glass-panel p-6 mt-6 border border-emerald-500/30">
                    <h3 className="text-2xl font-bold mb-4 text-emerald-400">2. Tuyến tính (Linear) vs Phi tuyến (Nonlinear)</h3>
                    <div className="bg-slate-800/60 p-5 rounded-xl border border-slate-600 mb-6 text-slate-300">
                        <div className="math-block text-emerald-300 font-bold border border-emerald-500/30 bg-emerald-900/20">
                            H[ a·f₁(x,y) + b·f₂(x,y) ] = a·H[f₁(x,y)] + b·H[f₂(x,y)]
                        </div>
                        <p className="mt-3 text-sm">Nếu phương trình (2-23) trên bị sai lệch với bất kỳ ảnh và hằng số nào, toán tử đó là <b>Phi tuyến</b>.</p>
                    </div>

                    <div className="bg-slate-900 p-6 rounded-xl border border-slate-700 shadow-xl mb-8">
                        <div className="flex flex-col md:flex-row justify-between items-center gap-6">
                            <div className="flex gap-6 items-center">
                                <MatrixInputSmall matrix={f1} setMatrix={setF1} label="Ảnh f₁" />
                                <MatrixInputSmall matrix={f2} setMatrix={setF2} label="Ảnh f₂" />
                            </div>
                            <div className="flex gap-4">
                                <div className="flex flex-col"><label className="text-xs text-slate-400 mb-1">Hằng số a</label><input type="number" className="w-16 h-8 text-center bg-slate-800 border border-slate-600 rounded text-white" value={a} onChange={e => setA(e.target.value)} /></div>
                                <div className="flex flex-col"><label className="text-xs text-slate-400 mb-1">Hằng số b</label><input type="number" className="w-16 h-8 text-center bg-slate-800 border border-slate-600 rounded text-white" value={b} onChange={e => setB(e.target.value)} /></div>
                            </div>
                            <div className="flex flex-col">
                                <label className="text-xs text-amber-400 font-bold mb-1">Chọn Toán tử H:</label>
                                <select className="bg-slate-800 text-white font-bold border-2 border-amber-500 rounded p-2 focus:outline-none" value={operator} onChange={e => setOperator(e.target.value)}>
                                    <option value="max">Toán tử Max (Phi tuyến)</option>
                                    <option value="sum">Toán tử Cộng ∑ (Tuyến tính)</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                        <div className="bg-slate-800/80 p-5 rounded-xl border border-slate-600 flex flex-col items-center">
                            <h4 className="text-white font-bold mb-4 border-b border-slate-600 w-full text-center pb-2">VẾ TRÁI: <span className="text-emerald-400 font-mono">H [ a·f₁ + b·f₂ ]</span></h4>
                            <div className="flex items-center gap-2 mb-4 text-sm text-slate-300 font-mono">
                                <MatrixDisplay data={a_f1} /> <span>+</span> <MatrixDisplay data={b_f2} />
                                <span>=</span> <MatrixDisplay data={sum_af1_bf2} colorClass="text-emerald-300 font-bold" />
                            </div>
                            <div className="text-2xl font-mono text-white bg-black/40 px-6 py-3 rounded border border-emerald-500/50">
                                {operator} <MatrixDisplay data={sum_af1_bf2} /> = <strong className="text-emerald-400 text-3xl">{lhsResult}</strong>
                            </div>
                        </div>
                        <div className="bg-slate-800/80 p-5 rounded-xl border border-slate-600 flex flex-col items-center">
                            <h4 className="text-white font-bold mb-4 border-b border-slate-600 w-full text-center pb-2">VẾ PHẢI: <span className="text-amber-400 font-mono">a · H[f₁] + b · H[f₂]</span></h4>
                            <div className="flex items-center gap-2 mb-4 text-sm text-slate-300 font-mono">
                                <span>{numA}</span> · <b>({H_f1})</b> <span>+</span> <span>({numB})</span> · <b>({H_f2})</b>
                            </div>
                            <div className="text-2xl font-mono text-white bg-black/40 px-6 py-3 rounded border border-amber-500/50">
                                {a_Hf1} + ({b_Hf2}) = <strong className="text-amber-400 text-3xl">{rhsResult}</strong>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // ==============================================================================
        // PHẦN 3: ARITHMETIC OPERATIONS (CÁC PHÉP TOÁN SỐ HỌC)
        // ==============================================================================

        // --- Ví dụ 2.5: Cộng ảnh (Noise Reduction) ---
        const ImageAdditionSim = () => {
            const [kImages, setKImages] = useState(1);
            const canvasCleanRef = useRef(null);
            const canvasNoisyRef = useRef(null);
            const canvasResultRef = useRef(null);
            
            const SIZE = 150;
            const NOISE_LEVEL = 80;

            // Generate clean image (Galaxy simulation)
            const generateCleanData = () => {
                const canvas = document.createElement('canvas');
                canvas.width = SIZE; canvas.height = SIZE;
                const ctx = canvas.getContext('2d');
                
                // Black bg
                ctx.fillStyle = '#0a0a0a';
                ctx.fillRect(0, 0, SIZE, SIZE);
                
                // Spiral galaxy glow
                const grad = ctx.createRadialGradient(SIZE/2, SIZE/2, 5, SIZE/2, SIZE/2, SIZE/2 - 20);
                grad.addColorStop(0, '#ffffff');
                grad.addColorStop(0.3, '#888888');
                grad.addColorStop(1, '#0a0a0a');
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, SIZE, SIZE);
                
                // Add some bright stars
                ctx.fillStyle = '#ffffff';
                ctx.beginPath(); ctx.arc(30, 30, 2, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(120, 40, 1.5, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(40, 120, 1, 0, Math.PI*2); ctx.fill();

                return ctx.getImageData(0, 0, SIZE, SIZE);
            };

            useEffect(() => {
                const cleanData = generateCleanData();
                const ctxClean = canvasCleanRef.current.getContext('2d');
                ctxClean.putImageData(cleanData, 0, 0);

                // Accumulator for averaging
                const acc = new Float32Array(SIZE * SIZE * 4);
                
                // Single noisy image (for comparison)
                let singleNoisyData = null;

                for (let k = 0; k < kImages; k++) {
                    const noisy = new Uint8ClampedArray(cleanData.data);
                    for (let i = 0; i < noisy.length; i += 4) {
                        const noise = gaussianRandom(0, NOISE_LEVEL);
                        noisy[i] = Math.min(255, Math.max(0, cleanData.data[i] + noise));
                        noisy[i+1] = Math.min(255, Math.max(0, cleanData.data[i+1] + noise));
                        noisy[i+2] = Math.min(255, Math.max(0, cleanData.data[i+2] + noise));
                        
                        acc[i] += noisy[i];
                        acc[i+1] += noisy[i+1];
                        acc[i+2] += noisy[i+2];
                        acc[i+3] += 255;
                    }
                    if (k === 0) {
                        singleNoisyData = new ImageData(noisy, SIZE, SIZE);
                    }
                }

                // Draw single noisy
                const ctxNoisy = canvasNoisyRef.current.getContext('2d');
                ctxNoisy.putImageData(singleNoisyData, 0, 0);

                // Draw averaged result
                const resultData = new ImageData(SIZE, SIZE);
                for (let i = 0; i < acc.length; i+=4) {
                    resultData.data[i] = acc[i] / kImages;
                    resultData.data[i+1] = acc[i+1] / kImages;
                    resultData.data[i+2] = acc[i+2] / kImages;
                    resultData.data[i+3] = 255;
                }
                const ctxResult = canvasResultRef.current.getContext('2d');
                ctxResult.putImageData(resultData, 0, 0);

            }, [kImages]);

            return (
                <div className="bg-slate-800 p-5 rounded-xl border border-slate-600 mt-6">
                    <h4 className="text-amber-400 font-bold mb-2">Ví dụ 2.5: Cộng ảnh (Averaging) để Khử nhiễu</h4>
                    <p className="text-sm text-slate-300 mb-4">
                        Nếu một bức ảnh bị nhiễu cộng (ví dụ ảnh thiên văn chụp trong điều kiện thiếu sáng), ta có thể chụp <span className="math-expr">K</span> bức ảnh liên tiếp của cùng 1 cảnh và tính trung bình (cộng chúng lại rồi chia cho K). Do nhiễu có giá trị trung bình bằng 0, việc cộng dồn sẽ triệt tiêu nhiễu, làm lộ ra bức ảnh gốc.
                    </p>

                    <div className="flex flex-wrap justify-center gap-6 mb-4">
                        <div className="text-center">
                            <canvas ref={canvasCleanRef} width={150} height={150} className="border border-slate-500 rounded bg-black"></canvas>
                            <div className="text-xs text-slate-400 mt-1">Ảnh Gốc (Lý thuyết)</div>
                        </div>
                        <div className="text-center">
                            <canvas ref={canvasNoisyRef} width={150} height={150} className="border border-slate-500 rounded bg-black"></canvas>
                            <div className="text-xs text-slate-400 mt-1">1 Ảnh bị Nhiễu</div>
                        </div>
                        <div className="text-center">
                            <canvas ref={canvasResultRef} width={150} height={150} className="border-4 border-amber-500 shadow-[0_0_15px_#f59e0b] rounded bg-black"></canvas>
                            <div className="text-xs text-amber-400 font-bold mt-1">Trung bình của K={kImages} ảnh</div>
                        </div>
                    </div>

                    <div className="flex items-center gap-4 max-w-md mx-auto bg-slate-900 p-4 rounded-lg">
                        <span className="text-white font-bold whitespace-nowrap">Số ảnh (K):</span>
                        <input type="range" min="1" max="100" value={kImages} onChange={e => setKImages(parseInt(e.target.value))} />
                        <span className="text-amber-400 font-mono w-8">{kImages}</span>
                    </div>
                </div>
            );
        };

        // --- Ví dụ 2.6 & Mask Mode Radiography: Trừ ảnh ---
        const ImageSubtractionSim = () => {
            const canvasMaskRef = useRef(null);
            const canvasLiveRef = useRef(null);
            const canvasDiffRef = useRef(null);
            const SIZE = 150;

            useEffect(() => {
                const drawScene = (ctx, withVessels) => {
                    // Background (Tissue/Bones)
                    ctx.fillStyle = '#888888';
                    ctx.fillRect(0, 0, SIZE, SIZE);
                    
                    // Xương mờ
                    ctx.fillStyle = '#bbbbbb';
                    ctx.beginPath(); ctx.ellipse(40, 75, 20, 60, Math.PI/4, 0, Math.PI*2); ctx.fill();
                    ctx.beginPath(); ctx.ellipse(110, 80, 25, 50, -Math.PI/6, 0, Math.PI*2); ctx.fill();

                    if (withVessels) {
                        // Mạch máu có thuốc cản quang (Darker because it absorbs X-rays)
                        ctx.strokeStyle = '#222222';
                        ctx.lineWidth = 4;
                        ctx.lineCap = 'round';
                        ctx.beginPath();
                        ctx.moveTo(75, 10);
                        ctx.lineTo(75, 50);
                        ctx.lineTo(50, 90);
                        ctx.lineTo(40, 130);
                        ctx.stroke();

                        ctx.beginPath();
                        ctx.moveTo(75, 50);
                        ctx.lineTo(110, 80);
                        ctx.lineTo(130, 140);
                        ctx.stroke();
                        
                        // Nhánh nhỏ
                        ctx.lineWidth = 2;
                        ctx.beginPath(); ctx.moveTo(50, 90); ctx.lineTo(20, 100); ctx.stroke();
                    }
                };

                // Draw Mask (h)
                const cMask = document.createElement('canvas'); cMask.width = SIZE; cMask.height = SIZE;
                const ctxMask = cMask.getContext('2d');
                drawScene(ctxMask, false);
                const maskData = ctxMask.getImageData(0, 0, SIZE, SIZE);
                canvasMaskRef.current.getContext('2d').putImageData(maskData, 0, 0);

                // Draw Live (f)
                const cLive = document.createElement('canvas'); cLive.width = SIZE; cLive.height = SIZE;
                const ctxLive = cLive.getContext('2d');
                drawScene(ctxLive, true);
                const liveData = ctxLive.getImageData(0, 0, SIZE, SIZE);
                canvasLiveRef.current.getContext('2d').putImageData(liveData, 0, 0);

                // Difference: g(x,y) = | f(x,y) - h(x,y) | 
                // Using absolute difference for better visibility (vessels become bright)
                const diffData = new ImageData(SIZE, SIZE);
                for(let i=0; i<maskData.data.length; i+=4) {
                    // Cường độ khác biệt
                    const diff = Math.abs(liveData.data[i] - maskData.data[i]);
                    // Tăng cường độ tương phản (Enhanced detail)
                    const enhanced = Math.min(255, diff * 3); 
                    
                    diffData.data[i] = enhanced;
                    diffData.data[i+1] = enhanced;
                    diffData.data[i+2] = enhanced;
                    diffData.data[i+3] = 255;
                }
                canvasDiffRef.current.getContext('2d').putImageData(diffData, 0, 0);

            }, []);

            return (
                <div className="bg-slate-800 p-5 rounded-xl border border-slate-600 mt-6">
                    <h4 className="text-cyan-400 font-bold mb-2">Ví dụ 2.6: Trừ ảnh (Image Subtraction) / Chụp mạch máu</h4>
                    <p className="text-sm text-slate-300 mb-4">
                        Phép trừ được dùng để làm nổi bật sự khác biệt. Ứng dụng y học <b>Mask mode radiography (DSA)</b>: Chụp một ảnh nền (Mask) trước khi tiêm thuốc. Sau khi tiêm thuốc cản quang vào mạch máu, chụp ảnh Live. Lấy <span className="math-expr">Live - Mask</span> sẽ xóa sạch nền xương/mô, chỉ giữ lại sơ đồ mạch máu cực kỳ sắc nét!
                    </p>

                    <div className="flex flex-wrap justify-center items-center gap-4 mb-4">
                        <div className="text-center">
                            <canvas ref={canvasMaskRef} width={150} height={150} className="border border-slate-500 rounded bg-black"></canvas>
                            <div className="text-xs text-slate-400 mt-1">Ảnh Mask h(x,y)</div>
                        </div>
                        <div className="text-2xl font-bold text-slate-500">-</div>
                        <div className="text-center">
                            <canvas ref={canvasLiveRef} width={150} height={150} className="border border-slate-500 rounded bg-black"></canvas>
                            <div className="text-xs text-slate-400 mt-1">Ảnh Live f(x,y)</div>
                        </div>
                        <div className="text-2xl font-bold text-slate-500">=</div>
                        <div className="text-center">
                            <canvas ref={canvasDiffRef} width={150} height={150} className="border-4 border-cyan-500 shadow-[0_0_15px_#06b6d4] rounded bg-black"></canvas>
                            <div className="text-xs text-cyan-400 font-bold mt-1">Hiệu số (Mạch máu)</div>
                        </div>
                    </div>
                </div>
            );
        };

        // --- Ví dụ 2.7: Nhân ảnh (Masking / ROI) ---
        const ImageMultiplicationSim = () => {
            const canvasSrcRef = useRef(null);
            const canvasMaskRef = useRef(null);
            const canvasResultRef = useRef(null);
            const SIZE = 150;

            useEffect(() => {
                // Draw source (Dental Xray mockup)
                const cSrc = document.createElement('canvas'); cSrc.width = SIZE; cSrc.height = SIZE;
                const ctxSrc = cSrc.getContext('2d');
                ctxSrc.fillStyle = '#444444'; ctxSrc.fillRect(0, 0, SIZE, SIZE);
                ctxSrc.fillStyle = '#aaaaaa'; 
                ctxSrc.beginPath(); ctxSrc.arc(40, 40, 25, 0, Math.PI*2); ctxSrc.fill();
                ctxSrc.beginPath(); ctxSrc.arc(110, 40, 25, 0, Math.PI*2); ctxSrc.fill();
                ctxSrc.beginPath(); ctxSrc.arc(75, 110, 25, 0, Math.PI*2); ctxSrc.fill();
                // Add fillings
                ctxSrc.fillStyle = '#ffffff';
                ctxSrc.fillRect(30, 25, 20, 10);
                ctxSrc.fillRect(65, 95, 20, 10);
                const srcData = ctxSrc.getImageData(0, 0, SIZE, SIZE);
                canvasSrcRef.current.getContext('2d').putImageData(srcData, 0, 0);

                // Draw Binary Mask
                const cMask = document.createElement('canvas'); cMask.width = SIZE; cMask.height = SIZE;
                const ctxMask = cMask.getContext('2d');
                ctxMask.fillStyle = '#000000'; ctxMask.fillRect(0, 0, SIZE, SIZE);
                ctxMask.fillStyle = '#ffffff'; // ROI is white (1)
                ctxMask.fillRect(20, 10, 40, 50);
                ctxMask.fillRect(55, 80, 40, 50);
                const maskData = ctxMask.getImageData(0, 0, SIZE, SIZE);
                canvasMaskRef.current.getContext('2d').putImageData(maskData, 0, 0);

                // Multiply: Source * (Mask / 255)
                const resultData = new ImageData(SIZE, SIZE);
                for(let i=0; i<srcData.data.length; i+=4) {
                    // Mask value is either 0 or 255. Divide by 255 to get 0 or 1.
                    const multiplier = maskData.data[i] / 255;
                    resultData.data[i] = srcData.data[i] * multiplier;
                    resultData.data[i+1] = srcData.data[i+1] * multiplier;
                    resultData.data[i+2] = srcData.data[i+2] * multiplier;
                    resultData.data[i+3] = 255;
                }
                canvasResultRef.current.getContext('2d').putImageData(resultData, 0, 0);

            }, []);

            return (
                <div className="bg-slate-800 p-5 rounded-xl border border-slate-600 mt-6">
                    <h4 className="text-purple-400 font-bold mb-2">Ví dụ 2.7: Nhân ảnh (Multiplication) / Trích xuất vùng quan tâm (ROI)</h4>
                    <p className="text-sm text-slate-300 mb-4">
                        Phép nhân ảnh thường được dùng để che mặt nạ (Masking) giữ lại Vùng quan tâm (ROI - Region of Interest). Mặt nạ là một ảnh nhị phân với giá trị <span className="math-expr">1 (Trắng)</span> ở vùng muốn giữ lại và <span className="math-expr">0 (Đen)</span> ở nơi khác. Khi nhân Từng phần tử, mọi thứ ngoài ROI sẽ bị nhân với 0 và biến mất.
                    </p>

                    <div className="flex flex-wrap justify-center items-center gap-4 mb-4">
                        <div className="text-center">
                            <canvas ref={canvasSrcRef} width={150} height={150} className="border border-slate-500 rounded bg-black"></canvas>
                            <div className="text-xs text-slate-400 mt-1">Ảnh Gốc (X-quang răng)</div>
                        </div>
                        <div className="text-2xl font-bold text-slate-500">×</div>
                        <div className="text-center">
                            <canvas ref={canvasMaskRef} width={150} height={150} className="border border-slate-500 rounded bg-black"></canvas>
                            <div className="text-xs text-slate-400 mt-1">Mặt nạ ROI (Nhị phân)</div>
                        </div>
                        <div className="text-2xl font-bold text-slate-500">=</div>
                        <div className="text-center">
                            <canvas ref={canvasResultRef} width={150} height={150} className="border-4 border-purple-500 shadow-[0_0_15px_#a855f7] rounded bg-black"></canvas>
                            <div className="text-xs text-purple-400 font-bold mt-1">Kết quả (Đã tách vùng)</div>
                        </div>
                    </div>
                </div>
            );
        };

        const ArithmeticOperations = () => {
            return (
                <div className="glass-panel p-6 mt-6 border border-pink-500/30">
                    <h3 className="text-2xl font-bold mb-4 text-pink-400">3. Các phép toán Số học (Arithmetic Operations)</h3>
                    <p className="text-slate-300 mb-4">Các phép toán cơ bản giữa hai ảnh (Cộng, Trừ, Nhân, Chia) đều được thực hiện theo cơ chế <b>Elementwise (Từng phần tử)</b> giữa các pixel có cùng tọa độ (x, y).</p>
                    
                    <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
                        <div className="bg-slate-900 p-3 rounded border border-slate-700 text-center font-mono text-sm text-emerald-300">s(x,y) = f(x,y) + g(x,y)</div>
                        <div className="bg-slate-900 p-3 rounded border border-slate-700 text-center font-mono text-sm text-cyan-300">d(x,y) = f(x,y) - g(x,y)</div>
                        <div className="bg-slate-900 p-3 rounded border border-slate-700 text-center font-mono text-sm text-purple-300">p(x,y) = f(x,y) × g(x,y)</div>
                        <div className="bg-slate-900 p-3 rounded border border-slate-700 text-center font-mono text-sm text-amber-300">v(x,y) = f(x,y) ÷ g(x,y)</div>
                    </div>

                    <ImageAdditionSim />
                    <ImageSubtractionSim />
                    <ImageMultiplicationSim />
                </div>
            );
        };


        // ==============================================================================
        // PHẦN 4: IMAGE SCALING (XỬ LÝ KẸP BIÊN)
        // ==============================================================================
        const ImageScalingSim = () => {
            // Mảng giá trị giả lập sau khi trừ (có thể ra số âm và số rất lớn)
            const [inputData, setInputData] = useState([-150, 50, 120, 400]);

            const handleInputChange = (index, val) => {
                const newData = [...inputData];
                newData[index] = isNaN(parseInt(val)) ? 0 : parseInt(val);
                setInputData(newData);
            };

            // Thuật toán Scaling theo phương trình 2-31 và 2-32
            const minG = Math.min(...inputData);
            // Bước 1: gm = g - min(g) (Đảm bảo giá trị nhỏ nhất = 0)
            const gm = inputData.map(g => g - minG);
            
            const maxGm = Math.max(...gm);
            // Bước 2: gs = K * (gm / max(gm)) (Scale về dải 0-255)
            // K = 255 for 8-bit image
            const K = 255;
            const gs = gm.map(val => maxGm === 0 ? 0 : Math.round(K * (val / maxGm)));

            return (
                <div className="glass-panel p-6 mt-6 border border-emerald-500/30">
                    <h3 className="text-2xl font-bold mb-4 text-emerald-400">4. Xử lý kẹp biên (Clipping & Scaling)</h3>
                    
                    <div className="bg-slate-800/60 p-5 rounded-xl border border-slate-600 mb-6 text-slate-300">
                        <p className="mb-2">Khi thực hiện phép tính số học (VD: Trừ ảnh), kết quả có thể vượt ra ngoài dải cường độ 8-bit cho phép (từ -255 đến 255). Cộng ảnh có thể lên tới 510. Có 2 cách xử lý:</p>
                        <ul className="list-disc ml-8 space-y-1 mb-4">
                            <li><b>Cắt xén (Clipping):</b> Đơn giản là gán mọi giá trị <span className="math-expr">&lt; 0</span> bằng 0, và mọi giá trị <span className="math-expr">&gt; 255</span> bằng 255. Gây mất chi tiết (mất mảng màu).</li>
                            <li><span className="text-emerald-400 font-bold">Chuẩn hóa toàn dải (Full-range Scaling):</span> Là phương pháp toán học giữ nguyên toàn bộ chi tiết phân bố của ảnh bằng cách co giãn nó vừa khít vào dải <span className="math-expr">[0, K]</span> (với 8-bit thì K=255).</li>
                        </ul>
                    </div>

                    <div className="bg-slate-900 p-6 rounded-xl border border-slate-700 shadow-xl mb-8">
                        <div className="flex flex-col md:flex-row items-center justify-between gap-6">
                            
                            {/* Input G */}
                            <div className="flex flex-col items-center">
                                <h4 className="text-white font-bold mb-2 text-sm">Dữ liệu thô g(x,y)</h4>
                                <div className="flex gap-2">
                                    {inputData.map((val, i) => (
                                        <input key={i} type="number" className="w-16 h-10 text-center bg-slate-800 border border-slate-500 rounded text-red-300 font-mono" value={val} onChange={e => handleInputChange(i, e.target.value)} />
                                    ))}
                                </div>
                                <div className="text-xs text-slate-400 mt-2">min(g) = <b className="text-red-400">{minG}</b></div>
                            </div>

                            <div className="text-2xl text-slate-500 font-bold">→</div>

                            {/* BƯỚC 1: Gm */}
                            <div className="flex flex-col items-center">
                                <h4 className="text-white font-bold mb-2 text-sm">Bước 1: Dịch gốc (Eq. 2-31)</h4>
                                <div className="math-block text-sm p-2 mb-2 bg-black/40">gₘ = g - min(g)</div>
                                <div className="flex gap-2">
                                    {gm.map((val, i) => (
                                        <div key={i} className="w-16 h-10 flex items-center justify-center bg-slate-800 border border-blue-500 rounded text-blue-300 font-mono">{val}</div>
                                    ))}
                                </div>
                                <div className="text-xs text-slate-400 mt-2">max(gₘ) = <b className="text-blue-400">{maxGm}</b></div>
                            </div>

                            <div className="text-2xl text-slate-500 font-bold">→</div>

                            {/* BƯỚC 2: Gs */}
                            <div className="flex flex-col items-center">
                                <h4 className="text-white font-bold mb-2 text-sm">Bước 2: Co giãn (Eq. 2-32)</h4>
                                <div className="math-block text-sm p-2 mb-2 bg-black/40">gₛ = K * [gₘ / max(gₘ)]</div>
                                <div className="flex gap-2">
                                    {gs.map((val, i) => (
                                        <div key={i} className="w-16 h-10 flex items-center justify-center bg-emerald-900/50 border-2 border-emerald-500 rounded text-emerald-400 font-bold font-mono text-lg">{val}</div>
                                    ))}
                                </div>
                                <div className="text-xs text-slate-400 mt-2">Toàn bộ đã nằm trong <b>[0, 255]</b></div>
                            </div>

                        </div>
                        <p className="text-center text-xs text-emerald-200 mt-6 italic">Hãy thử nhập các số âm sâu (như -500) hoặc dương cao (như 1000). Thuật toán sẽ luôn tự động dịch giá trị bé nhất về 0, và co giãn giá trị lớn nhất về đúng 255!</p>
                    </div>

                </div>
            );
        };


        // ==============================================================================
        // MAIN APP COMPONENT
        // ==============================================================================
        const App = () => {
            return (
                <div className="min-h-screen p-4 md:p-8 max-w-[1200px] mx-auto space-y-8">
                    <header className="text-center space-y-4 mb-6 border-b border-slate-700 pb-6">
                        <h1 className="text-3xl md:text-5xl font-extrabold tracking-tight">
                            <span className="gradient-text">Công cụ Toán học: Xử lý Ảnh</span>
                        </h1>
                        <p className="text-lg text-slate-400 max-w-3xl mx-auto">
                            Minh họa sách giáo khoa (Phần 2.6): Các Phép toán Elementwise, Linear, Số học (Cộng/Trừ/Nhân/Chia) và Kỹ thuật Chuẩn hóa (Scaling).
                        </p>
                    </header>

                    <ElementwiseVsMatrix />
                    <LinearVsNonLinear />
                    <ArithmeticOperations />
                    <ImageScalingSim />

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
